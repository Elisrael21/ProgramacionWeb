    <title>Catálogo de Artistas JSON</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #f4f4f9; padding: 20px; }
        .container { max-width: 800px; margin: auto; background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        
        /* Estilo para el menú */
        .menu { margin-bottom: 20px; text-align: center; }
        select { padding: 10px; font-size: 16px; border-radius: 5px; cursor: pointer; }

        /* Contenedor Flexbox para la ficha del artista */
        .card { display: flex; gap: 20px; align-items: center; border-top: 2px solid #eee; padding-top: 20px; display: none; }
        
        .card-left img { width: 300px; height: 300px; object-fit: cover; border-radius: 10px; box-shadow: 2px 2px 15px rgba(0,0,0,0.2); }
        
        .card-right { flex: 1; }
        .card-right h2 { margin-top: 0; color: #333; }
        .card-right p { margin: 5px 0; color: #666; }
        .songs { font-style: italic; color: #2c3e50; }
    </style>
</head>

    <div class="menu">

    </div>
</div>

    // Convertimos el JSON a objeto de JavaScript
    const info = JSON.parse(dataJSON);

    function mostrarArtista() {
        const selector = document.getElementById("artistSelector");
        const index = selector.value;
        const card = document.getElementById("artistCard");

        if (index !== "") {
            const artista = info.artistas[index];

            // Inyectamos la información en el HTML
            document.getElementById("artistName").innerText = artista.nombre;
            document.getElementById("artistAge").innerText = artista.edad;
            document.getElementById("artistOrigin").innerText = artista.origen;
            document.getElementById("artistSongs").innerText = artista.canciones.join(", ");
            document.getElementById("artistImg").src = artista.foto;

            // Mostramos la tarjeta con Flexbox
            card.style.display = "flex";
        } else {
            card.style.display = "none";
        }
    }
</script>
